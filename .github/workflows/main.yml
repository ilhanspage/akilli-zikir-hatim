name: Build Android APK and AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "android/AkilliZikirHatim/**"
      - ".github/workflows/**"

jobs:
  android-build:
    name: Build APK/AAB
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ANDROID_PROJECT_DIR: android/AkilliZikirHatim
      GENERATED_KEY_ALIAS: akilli_zikir_upload

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Prepare release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD_SECRET: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS_SECRET: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD_SECRET: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          cd "$ANDROID_PROJECT_DIR"
          mkdir -p app/keystore

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD_SECRET:-}" ] && [ -n "${ANDROID_KEY_ALIAS_SECRET:-}" ] && [ -n "${ANDROID_KEY_PASSWORD_SECRET:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/keystore/upload-keystore.jks
            echo "ANDROID_KEYSTORE_PATH=$PWD/app/keystore/upload-keystore.jks" >> "$GITHUB_ENV"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD_SECRET" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS_SECRET" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD_SECRET" >> "$GITHUB_ENV"
          else
            STORE_PASS="$(openssl rand -base64 30 | tr -d '=+/ ' | cut -c1-24)"
            KEY_PASS="$(openssl rand -base64 30 | tr -d '=+/ ' | cut -c1-24)"

            keytool -genkeypair \
              -v \
              -keystore app/keystore/upload-keystore.jks \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -alias "$GENERATED_KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Ilhan BELUK, OU=Akilli Zikir Hatim, O=Ilhan BELUK Yazilim, L=Gaziantep, ST=Gaziantep, C=TR"

            {
              echo "BU DOSYAYI VE upload-keystore.jks DOSYASINI KAYBETMEYIN."
              echo "ANDROID_KEYSTORE_PASSWORD=$STORE_PASS"
              echo "ANDROID_KEY_ALIAS=$GENERATED_KEY_ALIAS"
              echo "ANDROID_KEY_PASSWORD=$KEY_PASS"
            } > app/keystore/KEYSTORE_CREDENTIALS_SAVE_THIS.txt

            echo "ANDROID_KEYSTORE_PATH=$PWD/app/keystore/upload-keystore.jks" >> "$GITHUB_ENV"
            echo "ANDROID_KEYSTORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_ALIAS=$GENERATED_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_PASSWORD=$KEY_PASS" >> "$GITHUB_ENV"
          fi

      - name: Build Debug APK with log file
        shell: bash
        run: |
          set +e
          mkdir -p build-logs
          gradle -p "$ANDROID_PROJECT_DIR" assembleDebug --console=plain --no-daemon > build-logs/debug-build.log 2>&1
          STATUS=$?
          echo "DEBUG_BUILD_STATUS=$STATUS" >> "$GITHUB_ENV"
          echo "---- DEBUG BUILD LAST 200 LINES ----"
          tail -n 200 build-logs/debug-build.log
          exit $STATUS

      - name: Build Release APK and AAB with log file
        if: success()
        shell: bash
        run: |
          set +e
          mkdir -p build-logs
          gradle -p "$ANDROID_PROJECT_DIR" assembleRelease bundleRelease --console=plain --no-daemon > build-logs/release-build.log 2>&1
          STATUS=$?
          echo "RELEASE_BUILD_STATUS=$STATUS" >> "$GITHUB_ENV"
          echo "---- RELEASE BUILD LAST 200 LINES ----"
          tail -n 200 build-logs/release-build.log
          exit $STATUS

      - name: Upload build logs always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BUILD_LOGS_SEND_TO_CHATGPT
          path: build-logs/*.log
          if-no-files-found: warn

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: akilli-zikir-debug-apk
          path: android/AkilliZikirHatim/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: akilli-zikir-release-apk
          path: android/AkilliZikirHatim/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload Release AAB for Play Console
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: akilli-zikir-release-aab-play-console
          path: android/AkilliZikirHatim/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload generated keystore backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SAVE-THIS-upload-keystore-and-credentials
          path: |
            android/AkilliZikirHatim/app/keystore/upload-keystore.jks
            android/AkilliZikirHatim/app/keystore/KEYSTORE_CREDENTIALS_SAVE_THIS.txt
          if-no-files-found: warn
